services:

  postgres:
    image: postgres:15
    container_name: netflix-postgres
    restart: always
    environment:
      POSTGRES_USER: netflix
      POSTGRES_PASSWORD: netflix
      POSTGRES_DB: netflixdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - netflix-network

  redis:
    image: redis:7
    container_name: netflix-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - netflix-network

  minio:
    image: minio/minio:latest
    container_name: netflix-minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - netflix-network

volumes:
  postgres_data:
  minio_data:

networks:
  netflix-network:
    driver: bridge